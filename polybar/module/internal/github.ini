[module/internal/github]
type = internal/github
token = ${file:.config/polybar/github.token}
user = waitimconfused

empty-notifications = false
interval = 10
api-url = https://hub.example.org/api/v3/

format = %{F#4E7B31}%{F-} <label>
label = %notifications%

format-offline = %{F#4E7B31}%{F-} <label-offline>
label-offline = Offline
