[bar/i3exit]
monitor = ${env:MONITOR:}
override-redirect = true
offset-y=50px
offset-x=70.65%
width = 29.45%
height = 42px
radius = 8
background = ${colors.alert}
foreground = #FFFFFF
border-top-size = 8px
border-left-size = 8px
border-right-size = 8px
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 0
separator = "  "
separator-foreground = ${colors.disabled}
font-0 = "Symbols Nerd Font:size=10;2"
font-1 = "JetBrains Mono:size=10;2"
modules-left = i3exit-overview
modules-right = i3exit-confirm i3exit-cancel
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


[module/i3exit-overview]
type = custom/text
format = <label>
label = %{A:xdotool key Escape:}%{F#FFAAAA} Confirm i3 exit%{F-}%{A}

[module/i3exit-cancel]
type = custom/text
format = <label>
label = %{A:xdotool key Escape:}%{A}

[module/i3exit-confirm]
type = custom/text
format = <label>
label = %{A:xdotool key super+alt+q:}%{A}
