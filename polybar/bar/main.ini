[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 42px
radius = 8px
background = ${colors.background}
foreground = ${colors.foreground}
border-top-size = 8px
border-left-size = 8px
border-right-size = 8px
border-color = #00000000
padding-left = 2
padding-right = 2
module-margin = 1
separator = "|"
line-size = 8
separator-foreground = ${colors.disabled}
font-0 = "Symbols Nerd Font:size=11;2"
font-1 = "JetBrains Mono:size=10;2"
font-2 = "Noto Emoji:size=11;2"
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
screenchange-reload = true
modules-left =		custom/rofi     internal/i3     custom/windows
modules-center =	internal/date     custom/playerctl
modules-right =		internal/pulseaudio     internal/backlight     internal/network     custom/tailscale     custom/stats     custom/bluetooth-battery     custom/battery     custom/dpms
