[bar/i3resize]
monitor = ${env:MONITOR:}
override-redirect = true
offset-y = 50px
offset-x = 70.65%
width = 29.45%
height = 42px
radius = 8
background = ${colors.alert}
foreground = $FFFFFF
border-top-size = 8px
border-left-size = 8px
border-right-size = 8px
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 0
separator = "  "
separator-foreground = ${colors.disabled}
font-0 = "Symbols Nerd Font:size=10;2"
font-1 = "JetBrains Mono:size=10;2"
modules-left = i3resize-overview
modules-right = i3resize-wshrink i3resize-wgrow i3resize-hshrink i3resize-hgrow
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


[module/i3resize-overview]
type = custom/text
format = <label>
label = %{A:xdotool key super+shift+r:}%{F#FFAAAA}  i3 Window resize mode%{F-}%{A}

[module/i3resize-wshrink]
type = custom/text
format = <label>
label = %{F#FFAAAA}󰡌%{F-} Left

[module/i3resize-wgrow]
type = custom/text
format = <label>
label = %{F#FFAAAA}󰡎%{F-} Right

[module/i3resize-hshrink]
type = custom/text
format = <label>
label = %{F#FFAAAA}󰡍%{F-} Up

[module/i3resize-hgrow]
type = custom/text
format = <label>
label = %{F#FFAAAA}󰡏%{F-} Down
