{
	match = "class_i='rofi'";
	animations = (
		# In
		{
			triggers = [ "open", "show" ];
			
			opacity =         { start=0;  end=1; duration=0.1 };
			offset-y =        { start=50; end=0; duration=0.1 };
			shadow-offset-y = { start=50; end=0; duration=0.1 };
		},

		# Out
		{
			triggers = [ "close", "hide" ];

			opacity =         { start=1; end=0;  duration=0.1 };
			offset-y =        { start=0; end=50; duration=0.1 };
			shadow-offset-y = { start=0; end=50; duration=0.1 };
		}
	);
}
