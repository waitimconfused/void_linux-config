{
	match = "class_i='i3lock'";

	animations = (
		
		# In
		{
			triggers = [ "open", "show" ];

			offset-y = {
				start = -1080;
				end = 0;
				duration = 0.2;
				curve = "cubic-bezier(0.61, 1, 0.87, 1)";
			};
		},

		# Out
		{
			triggers = [ "close", "hide" ];
			preset = "slide-out";
			direction = "up";
			duration = 0.2;
		}
	);
}
