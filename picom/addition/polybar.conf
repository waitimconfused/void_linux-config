{
	match = "class_i='polybar'";
	corner-radius = 0;
	shadow = false;

	animations = (
	
		# Opening and showing of Polybar
		{
			triggers = [ "open", "show" ];
			preset = "slide-in";
			direction = "up";
			duration = 0.1;
		},

		# Closing and hiding of Polybar
		{
			triggers = [ "close", "hide" ];
			preset = "slide-out";
			direction = "up";
			duration = 0.1;
		}
	);
}
