# Workspace gestures (3 finger)
# Note: Pressing shift while swipping does the same as super+ctrl+shift+DIRECTION (moving view+window)
gesture swipe left  3   xdotool key super+ctrl+Left
gesture swipe up    3   xdotool key super+ctrl+Left
gesture swipe right 3   xdotool key super+ctrl+Right
gesture swipe down  3   xdotool key super+ctrl+Right

# Window gestures (4 finger)
gesture swipe up    4   xdotool key super+shift+Up
gesture swipe down  4   xdotool key super+shift+Down
gesture swipe left  4   xdotool key super+shift+Left
gesture swipe right 4   xdotool key super+shift+Right

swipe_threshold 60
