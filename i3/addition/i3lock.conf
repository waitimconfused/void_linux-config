exec $HOME/.config/i3/script/lock-screen.sh --no-suspend

bindsym $mod+l exec $HOME/.config/i3/script/lock-screen.sh
bindsym --release XF86PowerOff exec $HOME/.config/i3/script/lock-screen.sh

# Auto sleep after 60sec
# exec_always xset s 60 +dpms

exec_always xset dpms 70 0 0
exec_always xset s 60 0
exec_always xss-lock -- $HOME/.config/i3/script/lock-screen.sh
