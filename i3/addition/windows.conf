set $move 25 px
set $resize 25 px

bindsym $mod+Shift+Left move left $move
bindsym $mod+Shift+Down move down $move
bindsym $mod+Shift+Up move up $move
bindsym $mod+Shift+Right move right $move

bindsym $mod+Shift+space floating toggle; sticky disable; resize set 952 507 px; move window to position center

bindsym $mod+Shift+h split h
bindsym $mod+Shift+v split v

bindsym $mod+f --release fullscreen toggle
bindsym $mod+Shift+a focus parent
bindsym $mod+Shift+c focus child

bindsym $mod+q kill



for_window [window_role=PictureInPicture] floating enable, sticky enable, resize set 600 300 px, move window position 1312 772 px

for_window [title=tty-clock] floating enable, sticky enable, resize set 378 203 px, move window position 1534 60 px

for_window [title=Solitaire] floating enable, resize set 612 950 px, move window position center



set $set_gaming_workspace move to workspace "", workspace ""
set $set_discord_workspace move to workspace "", workspace ""

for_window [title="Steam.*"] $set_gaming_workspace

for_window [title="Prism Launcher.*"] $set_gaming_workspace

for_window [title="Minecraft.*"] $set_gaming_workspace, fullscreen enable

for_window [title=".*Discord.*"] $set_discord_workspace, fullscreen enable



# resize window (you can also use the mouse for that)
mode "resize" {
	# Pressing left will shrink the window’s width.
	# Pressing right will grow the window’s width.
	# Pressing up will shrink the window’s height.
	# Pressing down will grow the window’s height.
	
	# bindsym Left resize shrink width $resize
	# bindsym Down resize grow height $resize
	# bindsym Up resize shrink height $resize
	# bindsym Right resize grow width $resize
	# bindsym Down+Right resize grown width $resize; resize grow

	bindsym Down			resize grow height $resize
	bindsym Down+Left		resize grow height $resize;	resize shrink width $resize
	bindsym Down+Left+Right		resize grow height $resize;	resize grow width $resize;	resize shrink width $resize
	bindsym Down+Left+Right+Up	resize grow height $resize;	resize grow width $resize;	resize shrink height $resize;	resize shrink width $resize
	bindsym	Down+Left+Up		resize grow height $resize;	resize shrink height $resize;	resize shrink width $resize
	bindsym Down+Right		resize grow height $resize;	resize grow width $resize
	bindsym Down+Right+Up		resize grow height $resize;	resize grow width $resize;	resize shrink height $resize
	bindsym Down+Up			resize grow height $resize;	resize shrink height $resize
	bindsym Left			resize shrink width $resize
	bindsym Left+Right		resize grow width $resize;	resize shrink width $resize
	bindsym Left+Right+Up		resize grow width $resize;	resize shrink height $resize;	resize shrink width $resize
	bindsym Left+Up			resize shrink height $resize;	resize shrink width $resize
	bindsym Right			resize grow width $resize
	bindsym Right+Up		resize grow width $resize;	resize shrink height $resize
	bindsym Up			resize shrink height $resize

	bindsym Escape mode "default"; exec pkill -f "polybar i3resize"
	bindsym $mod+Shift+r mode "default"; exec pkill -f "polybar i3resize"
}

bindsym $mod+Shift+r mode "resize"; exec polybar i3resize

